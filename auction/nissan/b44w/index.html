<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Live Auction Feed | Amarasinghe Prime Enterprises</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .portal-header { text-align: center; margin: 2rem 0; padding: 0 1rem; }
        .portal-header h2 { color: var(--primary); font-weight: 800; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .portal-header p { color: var(--muted); font-size: 0.95rem; }

        /* Detailed Card Layout */
        .auction-list { display: flex; flex-direction: column; gap: 1.5rem; max-width: 900px; margin: 0 auto 3rem; padding: 0 1rem; }
        .vehicle-list-card { display: flex; flex-direction: column; background: #fff; border: 1px solid rgba(0,48,135,0.15); border-radius: 1rem; box-shadow: 0 4px 16px rgba(0,0,0,0.06); overflow: hidden; }
        
        @media (min-width: 768px) {
            .vehicle-list-card { flex-direction: row; }
        }

        /* Left Side: Thumbnail */
        .veh-thumbnail-wrapper { position: relative; flex: 0 0 320px; background: #eee; cursor: pointer; }
        .veh-thumbnail-wrapper img { width: 100%; height: 100%; object-fit: cover; min-height: 240px; }
        .photo-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0, 48, 135, 0.85); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; backdrop-filter: blur(4px); }
        .veh-thumbnail-wrapper:hover img { opacity: 0.9; }

        /* Right Side: Data */
        .veh-data { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .veh-data h3 { font-size: 1.3rem; color: var(--text); margin-bottom: 0.25rem; font-weight: 800; }
        .auction-detail-text { font-size: 0.9rem; color: #d32f2f; font-weight: 700; margin-bottom: 1rem; }
        
        .specs-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.85rem; }
        .specs-table td { padding: 6px 0; border-bottom: 1px solid #eee; }
        .specs-table td:nth-child(odd) { color: var(--muted); width: 40%; }
        .specs-table td:nth-child(even) { font-weight: 600; color: var(--text); }

        .time-box { background: #f8faff; border-left: 4px solid var(--primary); padding: 10px; border-radius: 4px; margin-bottom: 1rem; }
        .time-box div { font-size: 0.85rem; margin-bottom: 2px; }
        .time-box .jst { color: var(--muted); }
        .time-box .slst { color: var(--primary); font-weight: 700; }

        .action-row { display: flex; gap: 10px; flex-wrap: wrap; }
        
        /* Lightbox Gallery */
        .lightbox { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .lightbox-content { position: relative; margin: auto; padding: 0; width: 90%; max-width: 1000px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .lightbox img { max-height: 85vh; max-width: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; z-index: 10000; }
        .close-btn:hover { color: #ccc; }
        
        .nav-btn { cursor: pointer; position: absolute; top: 50%; width: auto; padding: 16px; margin-top: -50px; color: white; font-weight: bold; font-size: 30px; transition: 0.2s; border-radius: 0 3px 3px 0; user-select: none; background: rgba(0,0,0,0.3); border: none; z-index: 10000;}
        .nav-btn:hover { background-color: rgba(0,0,0,0.8); }
        .prev-btn { left: 0; border-radius: 3px 0 0 3px; }
        .next-btn { right: 0; border-radius: 3px 0 0 3px; }
        
        .image-counter { position: absolute; bottom: 20px; color: white; font-size: 1rem; font-weight: 600; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;}

        .loading-state { text-align: center; padding: 3rem; color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="/" class="logo-link">
            <img src="/logo.png" alt="Amarasinghe Prime Logo" width="160" height="75">
        </a>
        <h1>Amarasinghe Prime Enterprises</h1>
        <div class="tagline">Exclusive Auction Portal</div>
    </header>

    <div class="portal-header">
        <h2>Nissan B44W Live Auctions</h2>
        <p>Premium JDM units available for immediate bidding.</p>
    </div>

    <div class="auction-list" id="auctionList">
        <div class="loading-state">Fetching latest units from auction houses...</div>
    </div>

    <div id="imageLightbox" class="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content">
            <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
            <img id="lightboxImg" src="">
            <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
            <div class="image-counter" id="imageCounter"></div>
        </div>
    </div>

    <footer class="final-footer">
        <img src="/logo.png" alt="Amarasinghe Prime Logo" class="footer-logo-img">
        <p>© 2026 Amarasinghe Prime Enterprises (PVT) LTD. All Rights Reserved (PV 00342707)</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="auction-feed.js"></script>

</body>
</html>
