name: Hambantota Port Schedule Update

on:
  schedule:
    # Runs at 6:30 AM, 12:30 PM, and 6:30 PM Sri Lanka Time (01:00, 07:00, 13:00 UTC)
    - cron: '0 1,7,13 * * *' 
  workflow_dispatch:

jobs:
  download-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Latest PDF via Premium Proxy
        run: |
          mkdir -p Documents/CQYB
          
          # We are now using &premium=true to bypass the Port's strict blocking.
          # This uses highly-rated residential IPs that are undetectable.
          curl -L -o "Documents/CQYB/Hambantota-Berthing.pdf" "http://api.scraperapi.com?api_key=${{ secrets.SCRAPER_API_KEY }}&premium=true&url=http://ezport.hipg.lk/Localfolder/Berthing/CQYB.pdf"

      - name: Validate PDF Content (Safety Guard)
        run: |
          # A real PDF is always much larger than an error message (208 bytes).
          # This checks if the file is at least 5KB. If it's smaller, it stops the bot.
          FILESIZE=$(stat -c%s "Documents/CQYB/Hambantota-Berthing.pdf")
          echo "Downloaded file size: $FILESIZE bytes"
          
          if [ $FILESIZE -lt 5000 ]; then
            echo "❌ ERROR: Downloaded file is too small ($FILESIZE bytes). The firewall likely blocked it."
            echo "Bot will stop now to prevent uploading an invalid file to your website."
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add Documents/CQYB/Hambantota-Berthing.pdf
          
          if git diff --staged --quiet; then
            echo "No changes detected in the PDF content."
          else
            git commit -m "Auto-update Hambantota Berthing Schedule (Premium Proxy)"
            git push
          fi
