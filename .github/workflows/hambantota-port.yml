name: Hambantota Port Schedule Update

on:
  schedule:
    # Runs at 6:00 AM, 12:00 PM, and 6:00 PM Sri Lanka Time
    - cron: '30 0,6,12 * * *' 
  workflow_dispatch:

jobs:
  download-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Latest PDF via Proxy
        run: |
          mkdir -p Documents/CQYB
          
          # This routes the download through ScraperAPI using your hidden secret key
          # It tricks the Port into thinking a normal user is downloading the file
          curl -L -o "Documents/CQYB/Hambantota-Berthing.pdf" "http://api.scraperapi.com?api_key=${{ secrets.SCRAPER_API_KEY }}&url=http://ezport.hipg.lk/Localfolder/Berthing/CQYB.pdf"

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add Documents/CQYB/Hambantota-Berthing.pdf
          
          if git diff --staged --quiet; then
            echo "No changes detected in the PDF content."
          else
            git commit -m "Auto-update Hambantota Berthing Schedule via Proxy"
            git push
          fi
