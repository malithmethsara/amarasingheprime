name: Weekly SLC Scraper

on:
  schedule:
    # Runs at 10:41 AM SL Time daily to catch delayed Customs uploads
    - cron: '11 5 * * *'  
  workflow_dispatch:      # Allows manual testing

jobs:
  scrape-slc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # NEW: Added PyPDF2 to read the Customs PDF
        run: pip install requests beautifulsoup4 PyPDF2

      - name: Run scraper script
        run: python Data/Rates/SLC/weekly-SLC-scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub-Actions-Bot"
          git config --global user.email "actions@github.com"
          
          git add Data/Rates/SLC/SLC-rates.csv
          git commit -m "Automated update: SLC JPY exchange rate" || exit 0
          git push
