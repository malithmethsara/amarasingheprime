name: Daily CBSL Scraper

on:
  schedule:
    - cron: '30 5 * * *'  # 11:00 AM SL Time
    - cron: '0 9 * * *'   # 02:30 PM SL Time
  workflow_dispatch:      # Allows manual testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper script
        # NEW: Point to the new file name and folder
        run: python Data/Rates/CBSL/daily-CBSL-scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub-Actions-Bot"
          git config --global user.email "actions@github.com"
          
          # NEW: Point to the new CSV location
          git add Data/Rates/CBSL/jpy_lkr_rates.csv
          
          git commit -m "Automated update: JPY/LKR selling rate" || exit 0
          git push
