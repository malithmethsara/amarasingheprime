name: Daily Shipping Schedule Scraper

on:
  schedule:
    - cron: '30 1 * * *'  # Runs at 07:00 AM SL Time daily
  workflow_dispatch:      # Allows you to run it manually right away

jobs:
  scrape-shipping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run shipping scraper
        run: python shipping_scraper.py

      - name: Commit and Push JSON
        run: |
          git config --global user.name "GitHub-Actions-Bot"
          git config --global user.email "actions@github.com"
          git add shipping_schedule.json
          git commit -m "Automated update: Japan to Hambantota shipping schedule" || exit 0
          git push
