name: SLC Rate Update Telegram

on:
  workflow_dispatch:
    inputs:
      rate:
        description: 'Rate or Date,Rate'
        required: true

permissions:
  contents: write

jobs:
  update-sort-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Smart Update & Sort
        run: |
          RAW_INPUT="${{ inputs.rate }}"
          
          # Check if input has a comma (Format: YYYY-MM-DD,Rate)
          if [[ "$RAW_INPUT" == *","* ]]; then
            # Trust the manual input
            THE_DATE=$(echo "$RAW_INPUT" | cut -d',' -f1 | xargs)
            THE_RATE=$(echo "$RAW_INPUT" | cut -d',' -f2 | xargs)
          else
            # SMART CALCULATION: Find the date of the most recent Monday
            # %u gives the day of the week (1=Monday, 2=Tuesday... 7=Sunday)
            DAY_OFFSET=$(( $(date +%u) - 1 ))
            THE_DATE=$(date -d "-$DAY_OFFSET days" +'%Y-%m-%d')
            THE_RATE=$(echo "$RAW_INPUT" | xargs)
          fi
          
          NEW_LINE="$THE_DATE,$THE_RATE"
          echo "Processing: $NEW_LINE"

          # Append to the Customs file
          echo "$NEW_LINE" >> "Data/Rates/SLC-rates.txt"

          # Sort and remove duplicates based on the DATE ($1).
          # If multiple rates exist for the same Monday, it keeps the newest one.
          awk -F, '{rates[$1]=$2} END {for (d in rates) print d","rates[d]}' "Data/Rates/SLC-rates.txt" | sort > temp_sorted.txt
          
          # Safety check
          if [ -s temp_sorted.txt ]; then
             mv temp_sorted.txt "Data/Rates/SLC-rates.txt"
             echo "✅ File successfully sorted and cleaned."
          else
             echo "❌ Error: Something went wrong, keeping old file."
             exit 1
          fi

          # Save to GitHub
          git config --global user.name "Telegram Bot (SLC)"
          git config --global user.email "actions@github.com"
          git add "Data/Rates/SLC-rates.txt"
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "📘 SLC Update: $NEW_LINE" && git push)
