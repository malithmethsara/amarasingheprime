name: Auto-Generate Shipping Data Feed

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 7:30 AM Sri Lanka time
  workflow_dispatch:

jobs:
  generate-data-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Scraper Tools
        run: pip install beautifulsoup4 requests

      - name: Extract Data to Pipe-Delimited TXT
        run: |
          python -c "
          import requests
          import os
          from bs4 import BeautifulSoup
          from datetime import date, datetime

          # 1. Folder Setup (Exact path requested)
          folder_path = 'Data/Shipping'
          os.makedirs(folder_path, exist_ok=True)

          # 2. Smart-Date Calculation (Handling month lengths and Feb 30)
          def adjust_month(source_date, months):
              month = source_date.month - 1 + months
              year = source_date.year + month // 12
              month = month % 12 + 1
              day = min(source_date.day, [31, 29 if year % 4 == 0 and (year % 100 != 0 or year % 400 == 0) else 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31][month-1])
              return date(year, month, day).strftime('%Y-%m-%d')

          today = date.today()
          date_from = adjust_month(today, -1)
          date_to = adjust_month(today, 1)

          # 3. Fetch the data using the dynamic link
          url = f'https://autocj.co.jp/spn/japan_shipping?arrival_port=Hambantota&leave_date_from={date_from}&leave_date_to={date_to}'
          headers = {'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X) AppleWebKit/605.1.15'}
          
          response = requests.get(url, headers=headers)
          soup = BeautifulSoup(response.text, 'html.parser')

          # 4. Map the 'Section' structure used by Autocom
          extracted_lines = []
          extracted_lines.append(f'META|{datetime.now().strftime(\"%Y-%m-%d %H:%M\")} SL Time|{date_from}|{date_to}')
          
          # Target the <section class='shipping'> blocks found in your file
          ship_blocks = soup.find_all('section', class_='shipping')
          
          for block in ship_blocks:
              # Extract Vessel/Voyage
              vessel_info = block.find('div', class_='shipstatus')
              vessel_name = 'Unknown'
              if vessel_info:
                  vessel_parts = vessel_info.find_all('div')
                  if len(vessel_parts) > 1:
                      vessel_name = vessel_parts[1].get_text(strip=True)
              
              # Extract Port Dates
              port_divs = block.find_all('div', class_='shipping_port')
              if port_divs:
                  # First port is usually ETD Japan, last is ETA Hambantota
                  etd = port_divs[0].find('div').get_text(strip=True) if port_divs[0].find('div') else ''
                  eta = port_divs[-1].find('div').get_text(strip=True) if port_divs[-1].find('div') else ''
                  
                  extracted_lines.append(f'SHIP|{vessel_name}|{etd}|{eta}')

          # 5. Save to shipping_data.txt
          file_final = os.path.join(folder_path, 'shipping_data.txt')
          with open(file_final, 'w', encoding='utf-8') as f:
              f.write('\n'.join(extracted_lines))
          "

      - name: Commit Updated Data
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add Data/Shipping/shipping_data.txt
          git commit -m "Automated RoRo Schedule Update" || echo "No changes today"
          git push
