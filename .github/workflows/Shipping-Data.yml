name: Generate Shipping Data from Uploaded HTML

on:
  push:
    paths:
      - '**.html' # Runs instantly when you upload the HTML file
  workflow_dispatch: # Allows you to run it manually

jobs:
  process-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Scraper Tools
        run: pip install beautifulsoup4

      - name: Extract Data from Uploaded File
        run: |
          python -c "
          import os
          import glob
          from bs4 import BeautifulSoup
          from datetime import datetime

          # 1. Path Setup
          output_folder = 'Data/Shipping'
          os.makedirs(output_folder, exist_ok=True)
          
          # 2. Find your uploaded HTML file
          search_pattern = '**/Shipping Schedule*.html'
          found_files = glob.glob(search_pattern, recursive=True)

          if not found_files:
              print('Error: No HTML file found!')
              exit(1)

          input_file = found_files[0]
          print(f'Processing: {input_file}')

          with open(input_file, 'r', encoding='utf-8') as f:
              soup = BeautifulSoup(f.read(), 'html.parser')

          extracted_lines = []
          # Meta line for your website
          extracted_lines.append(f'META|{datetime.now().strftime(\"%Y-%m-%d %H:%M\")} SL Time|Local Upload')

          # 3. Targeted Extraction (Based on your provided HTML structure)
          ships = soup.find_all('section', class_='shipping')
          
          for ship in ships:
              status_div = ship.find('div', class_='shipstatus')
              if status_div:
                  vessel_info = status_div.find_all('div')
                  vessel = vessel_info[1].get_text(strip=True) if len(vessel_info) > 1 else 'Unknown'
                  
                  date_divs = ship.find_all('div', class_='shipping_port')
                  etd = date_divs[0].find('div').get_text(strip=True) if date_divs else ''
                  eta = date_divs[-1].find('div').get_text(strip=True) if date_divs else ''
                  
                  # Format: SHIP|Vessel|ETD|ETA
                  extracted_lines.append(f'SHIP|{vessel}|{etd}|{eta}')

          # 4. Save to the exact path requested
          output_path = os.path.join(output_folder, 'shipping_data.txt')
          with open(output_path, 'w', encoding='utf-8') as f:
              f.write('\n'.join(extracted_lines))
          "

      - name: Commit Updated Data
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add Data/Shipping/shipping_data.txt
          
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Updated shipping_data.txt from manual upload"
            git pull --rebase origin main
            git push
          fi
