name: Auto-Generate Shipping Data Feed

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 7:30 AM Sri Lanka time
  workflow_dispatch:

jobs:
  generate-data-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Scraper Tools
        run: pip install beautifulsoup4 requests

      - name: Extract Data to Pipe-Delimited TXT
        run: |
          python -c "
          import requests
          import os
          from bs4 import BeautifulSoup
          from datetime import date, datetime

          # 1. Using your preferred folder name (with underscore for safety)
          folder_path = 'Shipping_Data'
          os.makedirs(folder_path, exist_ok=True)

          def adjust_month(source_date, months):
              month = source_date.month - 1 + months
              year = source_date.year + month // 12
              month = month % 12 + 1
              day = min(source_date.day, [31,
                  29 if year % 4 == 0 and (year % 100 != 0 or year % 400 == 0) else 28,
                  31, 30, 31, 30, 31, 31, 30, 31, 30, 31][month-1])
              return date(year, month, day).strftime('%Y-%m-%d')

          today = date.today()
          date_from = adjust_month(today, -1)
          date_to = adjust_month(today, 1)

          url = f'https://autocj.co.jp/spn/japan_shipping?arrival_port=Hambantota&leave_date_from={date_from}&leave_date_to={date_to}'
          headers = {'User-Agent': 'Mozilla/5.0'}
          response = requests.get(url, headers=headers)
          soup = BeautifulSoup(response.text, 'html.parser')

          rows = soup.find_all('tr')
          extracted_lines = []
          extracted_lines.append(f'META|{datetime.now().strftime(\"%Y-%m-%d %H:%M\")} SL Time|{date_from}|{date_to}')
          
          for row in rows:
              cols = row.find_all('td')
              if len(cols) >= 5:
                  vessel = cols[0].text.strip().split('\n')[0]
                  etd = cols[1].text.strip()
                  eta = cols[4].text.strip()
                  if 'Vessel' not in vessel and vessel:
                      extracted_lines.append(f'SHIP|{vessel}|{etd}|{eta}')

          # 2. Save to the new folder name
          file_final = os.path.join(folder_path, 'shipping_data.txt')
          with open(file_final, 'w') as f:
              f.write('\n'.join(extracted_lines))
          "

      - name: Commit to Repository
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add Shipping_Data/shipping_data.txt
          git commit -m "Shipping Data Update" || echo "No changes"
          git push
