name: Generate Shipping Data from Uploaded HTML

on:
  push:
    paths:
      - '**.html' # Runs whenever you upload a new HTML file
  workflow_dispatch: # Allows you to run it manually

jobs:
  process-local-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Scraper Tools
        run: pip install beautifulsoup4

      - name: Map Data from Local HTML
        run: |
          python -c "
          import os
          from bs4 import BeautifulSoup
          from datetime import datetime

          # 1. Path Setup (Using your exact Capitalization)
          output_folder = 'Data/Shipping'
          os.makedirs(output_folder, exist_ok=True)
          
          # Use the exact filename you uploaded
          input_file = 'Shipping Schedule _ Autocom Japan.html'
          
          if not os.path.exists(input_file):
              print(f'Error: {input_file} not found in root directory!')
              exit(1)

          with open(input_file, 'r', encoding='utf-8') as f:
              soup = BeautifulSoup(f.read(), 'html.parser')

          extracted_lines = []
          # Meta Line for your website
          extracted_lines.append(f'META|{datetime.now().strftime(\"%Y-%m-%d %H:%M\")} SL Time|Local Upload')

          # 2. Targeted Extraction for Autocom's 'section.shipping' tags
          ships = soup.find_all('section', class_='shipping')
          
          for ship in ships:
              # Get Vessel and Voyage
              status_div = ship.find('div', class_='shipstatus')
              if status_div:
                  vessel_info = status_div.find_all('div')
                  vessel = vessel_info[1].text.strip() if len(vessel_info) > 1 else 'Unknown'
                  
                  # Get Dates
                  date_divs = ship.find_all('div', class_='shipping_port')
                  # Usually: first date is departure, last date is arrival
                  etd = date_divs[0].find('div').text.strip() if len(date_divs) > 0 else ''
                  eta = date_divs[-1].find('div').text.strip() if len(date_divs) > 0 else ''
                  
                  extracted_lines.append(f'SHIP|{vessel}|{etd}|{eta}')

          # 3. Save to your specific path
          output_path = os.path.join(output_folder, 'shipping_data.txt')
          with open(output_path, 'w', encoding='utf-8') as f:
              f.write('\n'.join(extracted_lines))
          
          print(f'Done! Found {len(extracted_lines)-1} ships and saved to {output_path}')
          "

      - name: Commit Updated TXT
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add Data/Shipping/shipping_data.txt
          git commit -m "Updated shipping_data.txt from manual HTML upload" || echo "No changes"
          git push
