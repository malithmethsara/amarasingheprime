- name: Commit and Sync Data
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # Add the new data file
          git add Data/Shipping/shipping_data.txt
          
          # Only proceed if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes detected in the shipping data."
          else
            git commit -m "Automated RoRo Schedule Update"
            
            # This is the fix: Pull your latest manual changes before pushing
            git pull --rebase origin main
            
            git push
          fi
